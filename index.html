<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>櫻坂46 楽曲レコメンド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>櫻坂46 楽曲レコメンド</h1>
        
        <div id="selection-area">
            <p>今の感情や気分に近いタグを最大3つ選んでください。</p>
            <div id="tags-container"></div>
            <p class="status">選択中のタグ: <span id="selected-count">0</span> / 3</p>
            <button id="recommend-btn" disabled>おすすめの曲を見る</button>
        </div>

        <div id="result-area" class="hidden">
            <h2>あなたにおすすめの楽曲</h2>
            <h3 id="result-title"></h3>
            <p>一致したタグ: <span id="result-matched-tags"></span></p>
            <a id="result-link" href="#" target="_blank" rel="noopener noreferrer">
                <img id="result-thumbnail" src="" alt="YouTubeサムネイル">
                <p>YouTubeで公式動画を見る</p>
            </a>
            <button id="restart-btn">やり直す</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
