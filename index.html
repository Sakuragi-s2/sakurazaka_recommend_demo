<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>気分で選ぶ、櫻坂46 楽曲レコメンド</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>今の気分で、櫻坂46の1曲を。</h1>
      <p class="subtitle">感情タグを最大3つ選んで、あなたにぴったりの楽曲を見つけよう</p>
    </header>

    <main>
      <!-- 選択画面 -->
      <section id="select-screen" class="screen">
        <div class="selected-count">
          選択中のタグ：<span id="selected-count-num">0</span> / 3
        </div>
        <div id="tag-list" class="tag-list">
          <!-- タグはJSで動的生成 -->
        </div>
        <button id="recommend-btn" class="primary-btn" disabled>おすすめの曲を見る</button>
      </section>

      <!-- 結果画面 -->
      <section id="result-screen" class="screen hidden">
        <div class="result-card">
          <p class="result-label">あなたへのおすすめ</p>
          <h2 id="result-title" class="result-title"></h2>
          <div class="result-tags">
            <p class="result-tags-label">一致した感情タグ</p>
            <div id="result-matched-tags" class="matched-tags"></div>
          </div>
          <div class="video-wrapper">
            <iframe
              id="result-video"
              src=""
              title="YouTube video player"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
          <a id="result-link" class="youtube-link" href="#" target="_blank" rel="noopener noreferrer">YouTubeで見る</a>
        </div>
        <button id="reset-btn" class="secondary-btn">やり直す</button>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
